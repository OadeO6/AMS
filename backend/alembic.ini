# alembic.ini
# Alembic runtime configuration.
# sqlalchemy.url is intentionally a placeholder — env.py overrides it
# from app.config.settings at runtime so the real URL is never hardcoded here.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Placeholder — overridden in alembic/env.py from Settings.DATABASE_URL
sqlalchemy.url = postgresql+asyncpg://user:pass@localhost/db

[post_write_hooks]
# Uncomment to auto-format new migration files with ruff:
# hooks = ruff
# ruff.type = exec
# ruff.entrypoint = ruff
# ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

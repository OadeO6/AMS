<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMS — Register</title>
    <link rel="stylesheet" href="shared/style.css">
    <style>
        .tab-row { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
        .tab { padding: 8px 16px; cursor: pointer; border-bottom: 2px solid transparent; color: var(--text-dim); }
        .tab.active { border-bottom-color: var(--accent); color: var(--text); font-weight: 500; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <header class="old-header" style="display:none"><span class="current">Register</span></header>

    <main>
        <section class="page-content" id="content">
            <a href="index.html" class="back-link">← Back to Console</a>
            <h1>📝 Account Registration</h1>
            <p class="subtitle">Test the self-registration endpoints for Students and Lecturers.</p>

            <div class="section-box" style="max-width: 500px;">
                <div class="tab-row">
                    <div class="tab active" data-role="lecturer">Register Lecturer</div>
                    <div class="tab" data-role="student">Register Student</div>
                </div>

                <!-- Common Fields -->
                <div class="row row-2">
                    <div class="field">
                        <label>First Name</label>
                        <input type="text" id="reg-fname" spellcheck="false" required>
                    </div>
                    <div class="field">
                        <label>Last Name</label>
                        <input type="text" id="reg-lname" spellcheck="false" required>
                    </div>
                </div>
                
                <div class="field">
                    <label>Email</label>
                    <input type="email" id="reg-email" spellcheck="false" required>
                </div>
                
                <div class="row row-2">
                    <div class="field">
                        <label>Password</label>
                        <input type="password" id="reg-password" required minlength="8">
                    </div>
                    <div class="field">
                        <label>Phone (optional)</label>
                        <input type="text" id="reg-phone" spellcheck="false">
                    </div>
                </div>

                <!-- Lecturer Specific -->
                <div id="fields-lecturer">
                    <div class="field">
                        <label>Staff ID</label>
                        <input type="text" id="reg-staff-id" spellcheck="false" placeholder="e.g. STF-001">
                    </div>
                </div>

                <!-- Student Specific -->
                <div id="fields-student" class="hidden">
                    <div class="row row-2">
                        <div class="field">
                            <label>Matriculation Number</label>
                            <input type="text" id="reg-matric" spellcheck="false" placeholder="e.g. 21/1234">
                        </div>
                        <div class="field">
                            <label>Admission Session</label>
                            <input type="text" id="reg-session" spellcheck="false" placeholder="e.g. 2021/2022">
                        </div>
                    </div>
                </div>

                <div class="field" style="margin-top: 12px;">
                    <label>Department</label>
                    <div class="row row-auto">
                        <select id="reg-dept" style="flex:1">
                            <option value="">— Loading departments —</option>
                        </select>
                        <button class="btn btn-sm btn-ghost" onclick="loadDepartments()">↻</button>
                    </div>
                    <p class="hint">Optional. User will be unassigned if left blank.</p>
                </div>

                <button id="btn-register" class="btn" style="width: 100%; margin-top: 16px;">Register Account</button>
                <pre id="reg-output" class="output hidden"></pre>
            </div>
        </section>
    </main>

    <script src="shared/layout.js"></script>
    <script src="shared/api.js"></script>
    <script src="shared/auth.js"></script>
    <script>
        let currentRole = 'lecturer';

        // Tab Switching logic
        document.querySelectorAll('.tab').forEach(t => {
            t.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
                t.classList.add('active');
                currentRole = t.dataset.role;
                
                document.getElementById('fields-lecturer').classList.toggle('hidden', currentRole !== 'lecturer');
                document.getElementById('fields-student').classList.toggle('hidden', currentRole !== 'student');
            });
        });

        async function loadDepartments() {
            const sel = document.getElementById('reg-dept');
            sel.innerHTML = '<option value="">— Loading... —</option>';
            try {
                // Anyone can fetch departments, no token required
                const res = await api.get('/admin/departments?limit=100');
                const depts = res.departments || [];
                let opts = '<option value="">— None —</option>';
                for (const d of depts) {
                    opts += `<option value="${d.id}">${d.name} (${d.faculty ? d.faculty.code : 'No Fac'})</option>`;
                }
                sel.innerHTML = opts;
            } catch (e) {
                sel.innerHTML = '<option value="">— Failed to load —</option>';
            }
        }

        document.getElementById('btn-register').addEventListener('click', async () => {
            const out = document.getElementById('reg-output');
            const btn = document.getElementById('btn-register');
            
            const payload = {
                first_name: document.getElementById('reg-fname').value.trim(),
                last_name: document.getElementById('reg-lname').value.trim(),
                email: document.getElementById('reg-email').value.trim(),
                password: document.getElementById('reg-password').value,
                phone: document.getElementById('reg-phone').value.trim() || undefined,
            };

            const deptId = document.getElementById('reg-dept').value;
            if (deptId) payload.department_id = deptId;

            if (currentRole === 'lecturer') {
                payload.staff_id = document.getElementById('reg-staff-id').value.trim();
                if (!payload.staff_id) return alert('Staff ID is required for lecturers.');
            } else {
                payload.matric_num = document.getElementById('reg-matric').value.trim();
                payload.admission_session = document.getElementById('reg-session').value.trim();
                if (!payload.matric_num || !payload.admission_session) return alert('Matric Num and Admission Session are required for students.');
            }

            if (!payload.first_name || !payload.last_name || !payload.email || !payload.password) {
                return alert('Please fill in all required fields.');
            }

            btn.disabled = true;
            btn.textContent = 'Registering...';
            out.classList.add('hidden');

            try {
                const res = await api.post(`/auth/register/${currentRole}`, payload);
                out.classList.remove('hidden');
                
                // The API returns { access_token, refresh_token, token_type }
                // We need to decode the token to get the user info to save it like auth.js does
                const decoded = auth.parseJwt(res.access_token);
                
                // Create the role object matching our local storage structure
                const roleObj = {
                    email: payload.email,
                    label: `${payload.first_name} (${currentRole})`,
                    role: currentRole,
                    access_token: res.access_token,
                    refresh_token: res.refresh_token,
                    user: {
                        id: decoded.sub,
                        first_name: payload.first_name,
                        last_name: payload.last_name,
                        email: payload.email,
                        roles: [currentRole],
                        department: deptId ? { id: deptId, name: 'Registered Dept' } : null
                    }
                };

                // Add to saved roles
                auth.saveRole(roleObj);
                // Set as active
                auth.setActiveRole(payload.email);
                
                out.className = 'output success';
                out.textContent = `✓ Successfully registered and logged in as ${payload.email}!\n\n` + JSON.stringify(res, null, 2);

            } catch (e) {
                out.classList.remove('hidden');
                out.className = 'output error';
                out.textContent = 'ERROR:\n' + JSON.stringify(e.data || e.message, null, 2);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Register Account';
            }
        });

        // Initialize
        loadDepartments();
    </script>
</body>
</html>

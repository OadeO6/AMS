# docker-compose.yml

services:
  # ---------------------------------------------------------------------------
  # API / Application
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    # Load all settings from the .env file as the single source of truth.
    # Only override variables whose values differ inside Docker
    # (i.e. internal service hostnames instead of localhost).
    env_file:
      - ./backend/.env
    environment:
      # Internal Docker hostnames — these differ from the localhost values in .env
      - DATABASE_URL=postgresql+asyncpg://ams_user:ams_pass@postgres:5432/ams_db
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_ENDPOINT_URL=http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ---------------------------------------------------------------------------
  # Database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=ams_user
      - POSTGRES_PASSWORD=ams_pass
      - POSTGRES_DB=ams_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ams_user -d ams_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Cache / Tokens / Queue
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Object Storage
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=ams_minio_user
      - MINIO_ROOT_PASSWORD=ams_minio_pass
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Frontend
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000
        - VITE_TRPC_URL=http://localhost:8000/api/trpc
    ports:
      - "8080:80"
    depends_on:
      - api


volumes:
  postgres_data:
  redis_data:
  minio_data:
